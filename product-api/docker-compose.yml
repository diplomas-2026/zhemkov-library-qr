services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library -d library_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/library_db
      DB_USERNAME: library
      DB_PASSWORD: library
      JWT_SECRET: 7x3Yw2s6k9p1r4t7v0z2b5n8m1q4s7u0x3y6a9c2e5g8i1k4
    ports:
      - "8080:8080"

volumes:
  postgres_data:

name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FQDN: zhemkov-library-qr.matstart.ru
      DEPLOY_DIR: /opt/zhemkov-library-qr
      COMPOSE_DIR: /opt
      API_SERVICE: zhemkov-api
      WEB_ROOT: /var/www/projects/zhemkov-library-qr.matstart.ru
      API_INTERNAL_URL: http://127.0.0.1:18027
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: product-web/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build web
        working-directory: product-web
        env:
          VITE_API_URL: https://${{ env.FQDN }}
        run: |
          npm ci
          npm run build

      - name: Build api jar
        working-directory: product-api
        run: |
          mvn -q -DskipTests clean package
          cp target/product-api-0.0.1-SNAPSHOT.jar app.jar

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy web to VPS (rsync)
        run: |
          rsync -az --delete \
            product-web/dist/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.WEB_ROOT }}/"

      - name: Prepare api repository on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "set -e; \
            cd '${{ env.DEPLOY_DIR }}' && \
            git fetch --all && \
            git checkout '${{ github.ref_name }}' && \
            if [ -e product-api/docker-compose.vps.yml ] && ! git ls-files --error-unmatch product-api/docker-compose.vps.yml >/dev/null 2>&1; then \
              ts=\$(date +%Y%m%d-%H%M%S); \
              mv -f product-api/docker-compose.vps.yml product-api/docker-compose.vps.yml.bak.\${ts}; \
            fi && \
            git pull --ff-only"

      - name: Upload api jar to VPS
        run: |
          rsync -az \
            product-api/app.jar \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_DIR }}/product-api/app.jar"

      - name: Restart api on VPS (docker compose)
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "set -e; \
            cd '${{ env.COMPOSE_DIR }}' && \
            docker compose up -d --build '${{ env.API_SERVICE }}'"

      - name: Smoke check
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "https://${{ env.FQDN }}/" >/dev/null; then
              break
            fi
            sleep 3
          done

          for i in $(seq 1 10); do
            code="$(curl -sS -o /dev/null -w '%{http_code}\n' "https://${{ env.FQDN }}/api/dashboard" || true)"
            if echo "$code" | grep -E '^(200|401|403)$' >/dev/null; then
              break
            fi
            sleep 3
          done

          curl -fsS "https://${{ env.FQDN }}/" >/dev/null
          curl -fsS -o /dev/null -w '%{http_code}\n' "https://${{ env.FQDN }}/api/dashboard" | grep -E '^(200|401|403)$'

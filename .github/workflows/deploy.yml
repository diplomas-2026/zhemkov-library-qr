name: Deploy to VPS

on:
  push:
    branches:
      - codex/library-qr
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FQDN: zhemkov-library-qr.matstart.ru
      DEPLOY_DIR: /opt/zhemkov-library-qr
      WEB_ROOT: /var/www/projects/zhemkov-library-qr.matstart.ru
      API_INTERNAL_URL: http://127.0.0.1:18027
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: product-web/package-lock.json

      - name: Build web
        working-directory: product-web
        env:
          VITE_API_URL: https://${{ env.FQDN }}
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy web to VPS (rsync)
        run: |
          rsync -az --delete \
            product-web/dist/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.WEB_ROOT }}/"

      - name: Deploy api to VPS (docker compose)
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "set -e; \
            cd '${{ env.DEPLOY_DIR }}' && \
            git fetch --all && \
            git checkout '${{ github.ref_name }}' && \
            if [ -e product-api/docker-compose.vps.yml ] && ! git ls-files --error-unmatch product-api/docker-compose.vps.yml >/dev/null 2>&1; then \
              ts=\$(date +%Y%m%d-%H%M%S); \
              mv -f product-api/docker-compose.vps.yml product-api/docker-compose.vps.yml.bak.\${ts}; \
            fi && \
            git pull --ff-only && \
            cd product-api && \
            docker compose -f docker-compose.vps.yml up -d --build"

      - name: Smoke check
        run: |
          curl -fsS "https://${{ env.FQDN }}/" >/dev/null
          curl -fsS -o /dev/null -w '%{http_code}\n' "https://${{ env.FQDN }}/api/dashboard" | grep -E '^(200|401|403)$'
